name: Upload images from issues

'on':
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: image-upload-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  upload:
    name: Save image attachments
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest
    steps:
      - name: Allow uploader
        id: permission
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.payload.comment?.user?.login || context.payload.issue?.user?.login || context.actor;
            core.setOutput("actor", actor);
            core.setOutput("permitted", "true");

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Process upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          UPLOADER: ${{ steps.permission.outputs.actor }}
          SOURCE_URL: ${{ github.event.issue.html_url }}
          MAX_IMAGE_BYTES: ${{ vars.MAX_IMAGE_BYTES }}
        run: |
          python scripts/process_issue_upload.py

      - name: Commit changes
        id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add data
          if [ -d images ]; then
            git add images
          fi
          git commit -m "Upload images from issue #${{ github.event.issue.number }}"
          git pull --rebase
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Reply with URLs
        if: ${{ github.event.issue.number }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.existsSync("upload_results.md")
              ? fs.readFileSync("upload_results.md", "utf8")
              : "No upload result was generated.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
